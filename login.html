<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAT Login Test</title>
  <!-- 블록 0100: 스타일 시작 -->
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
    .test-section { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
    .test-section h3 { margin-top: 0; }
    button { padding: 10px 20px; background: #f5a623; border: none; border-radius: 6px; color: #fff; font-weight: 700; cursor: pointer; }
    button:hover { background: #e0941a; }
    .result { background: #f8f9fa; padding: 15px; border-radius: 6px; margin-top: 10px; white-space: pre-wrap; font-size: 14px; }
    .success { color: #27ae60; }
    .error { color: #e74c3c; }
    .password-wrapper { position: relative; width: 100%; }
    .password-wrapper input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; padding-right: 40px; }
    .toggle-password { position: absolute; right: 10px; top: 25%; transform: translateY(-25%); cursor: pointer; font-size: 20px; user-select: none; }
  </style>
  <!-- 블록 0100: 스타일 끝 -->
</head>
<body>
  <!-- 블록 0200: 헤더 시작 -->
  <h1>SAT Login System - Test Page</h1>
  <p>GitHub Pages에서 직접 테스트하여 모든 기능을 검증합니다.</p>
  <!-- 블록 0200: 헤더 끝 -->

  <!-- 블록 0300: 테스트 섹션들 시작 -->
  <!-- 0310: 로그인 -->
  <div class="test-section">
    <h3>🔐 TEST 1: Login</h3>
    <input id="loginEmail" type="email" placeholder="Email" value="student@gmail.com" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:4px;box-sizing:border-box;">
    <div class="password-wrapper">
      <input id="loginPassword" type="password" placeholder="Enter your password">
      <span class="toggle-password" id="toggleLoginPassword">👁️</span>
    </div>
    <button id="testLoginBtn">Login</button>
    <div id="loginResult" class="result">Click Login to test.</div>
  </div>

 <!-- 0320: 회원가입 -->
<div class="test-section">
  <h3>📝 TEST 2: Signup</h3>
  <input id="signupEmail" type="email" placeholder="Enter your email" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:4px;box-sizing:border-box;">
  <input id="signupName" type="text" placeholder="Enter your name" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:4px;box-sizing:border-box;">
  <input id="signupPhone" type="tel" placeholder="Phone number (10-11 digits)" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:4px;box-sizing:border-box;">
  <div class="password-wrapper">
    <input id="signupPassword" type="password" placeholder="Create password (min 4 characters)">
    <span class="toggle-password" id="toggleSignupPassword">👁️</span>
  </div>
  <div class="password-wrapper">
    <input id="signupPasswordConfirm" type="password" placeholder="Confirm password">
    <span class="toggle-password" id="toggleSignupPasswordConfirm">👁️</span>
  </div>
  <button id="testSignupBtn">Sign Up</button>
  <div id="signupResult" class="result">Click Sign Up to test.</div>
</div>

  <!-- 0330: 상태확인 -->
  <div class="test-section">
    <h3>📊 TEST 3: Status</h3>
    <button id="testStatusBtn">Check Status</button>
    <div id="statusResult" class="result">Click Check Status.</div>
  </div>

  <!-- 0340: Password 변경 -->
  <div class="test-section">
    <h3>🔑 TEST 4: Change Password</h3>
    <input id="changeEmail" type="email" placeholder="Enter your email" value="student@gmail.com" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:4px;box-sizing:border-box;">
    <div class="password-wrapper">
      <input id="changeOldPassword" type="password" placeholder="Enter current password">
      <span class="toggle-password" id="toggleChangeOldPassword">👁️</span>
    </div>
    <div class="password-wrapper">
      <input id="changeNewPassword" type="password" placeholder="Enter new password (min 4 characters)">
      <span class="toggle-password" id="toggleChangeNewPassword">👁️</span>
    </div>
    <div class="password-wrapper">
      <input id="changeNewPasswordConfirm" type="password" placeholder="Confirm new password">
      <span class="toggle-password" id="toggleChangeNewPasswordConfirm">👁️</span>
    </div>
    <button id="testChangePasswordBtn">Change Password</button>
    <div id="changePasswordResult" class="result">Click Change Password to test.</div>
  </div>
  <!-- 블록 0300: 테스트 섹션들 끝 -->

  <!-- 블록 0400-1100: JavaScript 시작 -->
  <script>
    // 블록 0400: 설정
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw-I6qPoy8bgXHyDnMhN0DG7EErk18UAmPce8sYKTmyp0e8KE1r1AsazpQyRCx_Xs4Q/exec';

    // 블록 0500: 공통 함수
    function showResult(elementId, message, isSuccess) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = 'result ' + (isSuccess ? 'success' : 'error');
    }

    // 블록 1000: 비밀번호 표시 토글 함수
    function togglePasswordVisibility(inputId, toggleId) {
      const input = document.getElementById(inputId);
      const toggle = document.getElementById(toggleId);
      if (input && toggle) {
        toggle.addEventListener('click', function() {
          if (input.type === 'password') {
            input.type = 'text';
            toggle.textContent = '🙈';
          } else {
            input.type = 'password';
            toggle.textContent = '👁️';
          }
        });
      }
    }

    // 블록 0600: 로그인
    document.getElementById('testLoginBtn').addEventListener('click', async function() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      showResult('loginResult', '⏳ Processing...', false);
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'login', email, pin: password })
        });
        const data = await response.json();
        showResult('loginResult', JSON.stringify(data, null, 2), data.success);
      } catch(err) {
        showResult('loginResult', '❌ Error: ' + err.message, false);
      }
    });

   // 블록 0700: 회원가입
document.getElementById('testSignupBtn').addEventListener('click', async function() {
  const email = document.getElementById('signupEmail').value.trim();
  const name = document.getElementById('signupName').value.trim();
  const phone = document.getElementById('signupPhone').value.trim();
  const password = document.getElementById('signupPassword').value.trim();
  const passwordConfirm = document.getElementById('signupPasswordConfirm').value.trim();
  
  if (password !== passwordConfirm) {
    showResult('signupResult', '❌ Passwords do not match.', false);
    return;
  }
  if (password.length < 4) {
    showResult('signupResult', '❌ Password must be at least 4 characters.', false);
    return;
  }
  if (phone === '') {
    showResult('signupResult', '❌ Phone number is required.', false);
    return;
  }
  if (!/^[0-9]{10,11}$/.test(phone)) {
    showResult('signupResult', '❌ Phone number must be 10-11 digits.', false);
    return;
  }
  
  showResult('signupResult', '⏳ Processing...', false);
  try {
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'signup', email, pin: password, name, pn: phone })
    });
    const data = await response.json();
    showResult('signupResult', JSON.stringify(data, null, 2), data.success);
  } catch(err) {
    showResult('signupResult', '❌ Error: ' + err.message, false);
  }
});

    // 블록 0800: 상태확인
    document.getElementById('testStatusBtn').addEventListener('click', async function() {
      showResult('statusResult', '⏳ Checking...', false);
      try {
        const response = await fetch(GAS_URL);
        const text = await response.text();
        showResult('statusResult', '✅ GAS Response:\n' + text, true);
      } catch(err) {
        showResult('statusResult', '❌ Error: ' + err.message, false);
      }
    });

    // 블록 0900: Password 변경
    document.getElementById('testChangePasswordBtn').addEventListener('click', async function() {
      const email = document.getElementById('changeEmail').value.trim();
      const oldPassword = document.getElementById('changeOldPassword').value.trim();
      const newPassword = document.getElementById('changeNewPassword').value.trim();
      const newPasswordConfirm = document.getElementById('changeNewPasswordConfirm').value.trim();
      
      if (!email || !oldPassword || !newPassword || !newPasswordConfirm) {
        showResult('changePasswordResult', '❌ Please fill in all fields.', false);
        return;
      }
      if (newPassword !== newPasswordConfirm) {
        showResult('changePasswordResult', '❌ New passwords do not match.', false);
        return;
      }
      if (newPassword.length < 4) {
        showResult('changePasswordResult', '❌ New password must be at least 4 characters.', false);
        return;
      }
      
      showResult('changePasswordResult', '⏳ Processing...', false);
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'changePassword', email, oldPassword, newPassword })
        });
        const data = await response.json();
        showResult('changePasswordResult', JSON.stringify(data, null, 2), data.success);
      } catch(err) {
        showResult('changePasswordResult', '❌ Error: ' + err.message, false);
      }
    });

    // 블록 1100: 토글 이벤트 연결
    document.addEventListener('DOMContentLoaded', function() {
      togglePasswordVisibility('loginPassword', 'toggleLoginPassword');
      togglePasswordVisibility('signupPassword', 'toggleSignupPassword');
      togglePasswordVisibility('signupPasswordConfirm', 'toggleSignupPasswordConfirm');
      togglePasswordVisibility('changeOldPassword', 'toggleChangeOldPassword');
      togglePasswordVisibility('changeNewPassword', 'toggleChangeNewPassword');
      togglePasswordVisibility('changeNewPasswordConfirm', 'toggleChangeNewPasswordConfirm');
    });
  </script>
  <!-- 블록 0400-1100: JavaScript 끝 -->
</body>
</html>
