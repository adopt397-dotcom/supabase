<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GongBoo.org - Member Login</title>

<!-- ====================================================================== -->
<!-- HTML-0100: CSS 스타일 (대분류) -->
<!-- ====================================================================== -->
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #F7FAFC;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .container {
        background: #FFFFFF;
        padding: 40px 30px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        border: 1px solid #E2E8F0;
        width: 100%;
        max-width: 420px;
    }
    h1 {
        font-size: 28px;
        font-weight: 800;
        text-align: center;
        color: #2D3748;
        letter-spacing: -0.5px;
        margin-bottom: 4px;
    }
    .subtitle {
        text-align: center;
        color: #718096;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.3px;
        margin-bottom: 28px;
    }
    .tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 24px;
        background: #F7FAFC;
        padding: 4px;
        border-radius: 10px;
    }
    .tab-btn {
        flex: 1;
        padding: 10px 0;
        border: none;
        background: transparent;
        font-size: 14px;
        font-weight: 600;
        color: #718096;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.2s;
    }
    .tab-btn.active {
        background: #F5A623;
        color: #FFFFFF;
        box-shadow: 0 2px 8px rgba(245, 166, 35, 0.25);
    }
    .tab-btn:hover:not(:active) { background: #EDF2F7; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #4A5568;
        margin-bottom: 5px;
    }
    .form-group input {
        width: 100%;
        padding: 12px 14px;
        background: #F7FAFC;
        border: 2px solid #E2E8F0;
        border-radius: 8px;
        font-size: 15px;
        transition: all 0.2s;
        color: #2D3748;
    }
    .form-group input:focus {
        outline: none;
        border-color: #F5A623;
        box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.12);
        background: #FFFFFF;
    }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 44px; }
    .toggle-password {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 20px;
        user-select: none;
        color: #A0AEC0;
        transition: color 0.2s;
    }
    .toggle-password:hover { color: #4A5568; }
    .btn-primary {
        width: 100%;
        padding: 14px;
        background: #F5A623;
        color: #FFFFFF;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 4px;
        box-shadow: 0 2px 8px rgba(245, 166, 35, 0.3);
        min-height: 52px;
    }
    .btn-primary:hover {
        background: #E0951F;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(245, 166, 35, 0.35);
    }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-signup {
        padding: 16px;
        font-size: 18px;
        min-height: 56px;
    }
    .result-box {
        background: #F7FAFC;
        padding: 14px;
        border-radius: 8px;
        margin-top: 16px;
        font-size: 14px;
        white-space: pre-wrap;
        word-break: break-all;
        min-height: 48px;
        border: 1px solid #E2E8F0;
        color: #2D3748;
    }
    .result-box.success { border-color: #48BB78; background: #F0FFF4; color: #276749; }
    .result-box.error { border-color: #FC8181; background: #FFF5F5; color: #C53030; }
    .form-hidden { display: none; }
    .link-btn {
        background: none;
        border: none;
        color: #F5A623;
        font-weight: 600;
        cursor: pointer;
        font-size: 14px;
        padding: 0 4px;
    }
    .link-btn:hover { text-decoration: underline; }
    .toggle-text {
        text-align: center;
        font-size: 14px;
        color: #718096;
        margin-top: 18px;
    }
    @media (max-width: 480px) {
        .container { padding: 24px 18px; }
        h1 { font-size: 24px; }
    }
</style>
</head>

<body>
<div class="container">

<!-- ====================================================================== -->
<!-- HTML-0200: 헤더/로고 (대분류) -->
<!-- ====================================================================== -->
<h1>GongBoo.org</h1>
<p class="subtitle">Member Service</p>

<!-- ====================================================================== -->
<!-- HTML-0300: 탭 메뉴 (대분류) -->
<!-- ====================================================================== -->
<div class="tabs">
    <button class="tab-btn active" data-tab="loginTab">Sign In</button>
    <button class="tab-btn" data-tab="signupTab">Sign Up</button>
    <button class="tab-btn" data-tab="changeTab">Change Password</button>
</div>

<!-- ====================================================================== -->
<!-- HTML-0310: 로그인 폼 (중분류) -->
<!-- ====================================================================== -->
<div id="loginTab" class="tab-content">
    <div class="form-group">
        <label>E-mail</label>
        <input id="loginEmail" type="email" placeholder="example@email.com">
    </div>
    <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
            <input id="loginPassword" type="password" placeholder="Enter your password">
            <span class="toggle-password" id="toggleLoginPassword">👁️</span>
        </div>
    </div>
    <button class="btn-primary" id="testLoginBtn">Login</button>
    <div id="loginResult" class="result-box">Waiting for login.</div>
</div>

<!-- ====================================================================== -->
<!-- HTML-0320: 회원가입 폼 (중분류) -->
<!-- ====================================================================== -->
<div id="signupTab" class="tab-content form-hidden">
    <div class="form-group">
        <label>E-mail</label>
        <input id="signupEmail" type="email" placeholder="example@email.com">
    </div>
    <div class="form-group">
        <label>Full Name</label>
        <input id="signupName" type="text" placeholder="Your full name">
    </div>
    <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
            <input id="signupPassword" type="password" placeholder="Create password (min 4 characters)">
            <span class="toggle-password" id="toggleSignupPassword">👁️</span>
        </div>
    </div>
    <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-wrapper">
            <input id="signupPasswordConfirm" type="password" placeholder="Confirm your password">
            <span class="toggle-password" id="toggleSignupPasswordConfirm">👁️</span>
        </div>
    </div>
    <button class="btn-primary btn-signup" id="testSignupBtn">Sign Up</button>
    <div id="signupResult" class="result-box">Waiting for sign up.</div>
    <div class="toggle-text">
        Already have an account? <button class="link-btn" id="gotoLoginFromSignup">Sign In</button>
    </div>
</div>

<!-- ====================================================================== -->
<!-- HTML-0330: 비밀번호 변경 폼 (중분류) -->
<!-- ====================================================================== -->
<div id="changeTab" class="tab-content form-hidden">
    <div class="form-group">
        <label>E-mail</label>
        <input id="changeEmail" type="email" placeholder="example@email.com">
    </div>
    <div class="form-group">
        <label>Current Password</label>
        <div class="password-wrapper">
            <input id="changeOldPassword" type="password" placeholder="Enter current password">
            <span class="toggle-password" id="toggleChangeOldPassword">👁️</span>
        </div>
    </div>
    <div class="form-group">
        <label>New Password (min 4 characters)</label>
        <div class="password-wrapper">
            <input id="changeNewPassword" type="password" placeholder="Enter new password">
            <span class="toggle-password" id="toggleChangeNewPassword">👁️</span>
        </div>
    </div>
    <div class="form-group">
        <label>Confirm New Password</label>
        <div class="password-wrapper">
            <input id="changeNewPasswordConfirm" type="password" placeholder="Confirm new password">
            <span class="toggle-password" id="toggleChangeNewPasswordConfirm">👁️</span>
        </div>
    </div>
    <button class="btn-primary" id="testChangePasswordBtn">Change Password</button>
    <div id="changePasswordResult" class="result-box">Waiting for password change.</div>
    <div class="toggle-text">
        <button class="link-btn" id="gotoLoginFromChange">Back to Sign In</button>
    </div>
</div>

</div>

<!-- ====================================================================== -->
<!-- HTML-0400: JavaScript (대분류) -->
<!-- ====================================================================== -->

<!-- ============================== -->
<!-- HTML-0410: 결과 표시 (소분류) -->
<!-- ============================== -->
<script>
function showResult(elementId, message, isSuccess) {
    const el = document.getElementById(elementId);
    el.textContent = message;
    el.className = 'result-box' + (isSuccess ? ' success' : ' error');
}
</script>

<!-- ============================== -->
<!-- HTML-0420: 비밀번호 토글 (소분류) -->
<!-- ============================== -->
<script>
function togglePasswordVisibility(inputId, toggleId) {
    const input = document.getElementById(inputId);
    const toggle = document.getElementById(toggleId);
    if (input && toggle) {
        toggle.addEventListener('click', function() {
            if (input.type === 'password') {
                input.type = 'text';
                toggle.textContent = '🙈';
            } else {
                input.type = 'password';
                toggle.textContent = '👁️';
            }
        });
    }
}
</script>

<!-- ============================== -->
<!-- HTML-0430: 탭 전환 (소분류) -->
<!-- ============================== -->
<script>
function initTabs() {
    const tabs = document.querySelectorAll('.tab-btn');
    const contents = {
        loginTab: document.getElementById('loginTab'),
        signupTab: document.getElementById('signupTab'),
        changeTab: document.getElementById('changeTab')
    };

    tabs.forEach(tab => {
        tab.addEventListener('click', function() {
            tabs.forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            Object.keys(contents).forEach(key => {
                contents[key].classList.toggle('form-hidden', key !== this.dataset.tab);
            });
        });
    });

    const gotoLoginFromSignup = document.getElementById('gotoLoginFromSignup');
    const gotoLoginFromChange = document.getElementById('gotoLoginFromChange');
    if (gotoLoginFromSignup) {
        gotoLoginFromSignup.addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelector('[data-tab="loginTab"]').click();
        });
    }
    if (gotoLoginFromChange) {
        gotoLoginFromChange.addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelector('[data-tab="loginTab"]').click();
        });
    }
}
</script>

<!-- ============================== -->
<!-- HTML-0440: 로그인 처리 (소분류) -->
<!-- ============================== -->
<script>
async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const btn = document.getElementById('testLoginBtn');

    if (!email || !password) {
        showResult('loginResult', 'Please enter both email and password.', false);
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Processing...';

    try {
        const data = await window.login(email, password);
        if (data.success) {
            window.saveSession(email, data.name || 'User');
            showResult('loginResult', '✅ Welcome, ' + (data.name || 'User') + '!', true);
            btn.disabled = false;
            btn.textContent = 'Login';
            // 로그인 성공 후 이동할 페이지 (나중에 설정)
            // window.location.href = '/tilda.cc.html';
        } else {
            showResult('loginResult', '❌ ' + (data.message || 'Login failed.'), false);
            btn.disabled = false;
            btn.textContent = 'Login';
        }
    } catch(err) {
        showResult('loginResult', '❌ Server connection error.', false);
        btn.disabled = false;
        btn.textContent = 'Login';
    }
}
</script>

<!-- ============================== -->
<!-- HTML-0450: 회원가입 처리 (소분류) -->
<!-- ============================== -->
<script>
async function handleSignup() {
    const email = document.getElementById('signupEmail').value.trim();
    const name = document.getElementById('signupName').value.trim();
    const password = document.getElementById('signupPassword').value.trim();
    const passwordConfirm = document.getElementById('signupPasswordConfirm').value.trim();
    const btn = document.getElementById('testSignupBtn');

    if (!email || !name || !password || !passwordConfirm) {
        showResult('signupResult', 'Please fill in all fields.', false);
        return;
    }

    if (password.length < 4) {
        showResult('signupResult', 'Password must be at least 4 characters.', false);
        return;
    }

    if (password !== passwordConfirm) {
        showResult('signupResult', 'Passwords do not match.', false);
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Processing...';

    try {
        const data = await window.signup(email, password, name);
        if (data.success) {
            showResult('signupResult', '✅ ' + data.message + ' (Awaiting admin approval)', true);
            btn.disabled = false;
            btn.textContent = 'Sign Up';
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupName').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('signupPasswordConfirm').value = '';
            setTimeout(() => {
                document.querySelector('[data-tab="loginTab"]').click();
            }, 2000);
        } else {
            showResult('signupResult', '❌ ' + (data.message || 'Signup failed.'), false);
            btn.disabled = false;
            btn.textContent = 'Sign Up';
        }
    } catch(err) {
        showResult('signupResult', '❌ Server connection error.', false);
        btn.disabled = false;
        btn.textContent = 'Sign Up';
    }
}
</script>

<!-- ============================== -->
<!-- HTML-0460: 비밀번호 변경 처리 (소분류) -->
<!-- ============================== -->
<script>
async function handleChangePassword() {
    const email = document.getElementById('changeEmail').value.trim();
    const oldPassword = document.getElementById('changeOldPassword').value.trim();
    const newPassword = document.getElementById('changeNewPassword').value.trim();
    const newPasswordConfirm = document.getElementById('changeNewPasswordConfirm').value.trim();
    const btn = document.getElementById('testChangePasswordBtn');

    if (!email || !oldPassword || !newPassword || !newPasswordConfirm) {
        showResult('changePasswordResult', 'Please fill in all fields.', false);
        return;
    }

    if (newPassword.length < 4) {
        showResult('changePasswordResult', 'New password must be at least 4 characters.', false);
        return;
    }

    if (newPassword !== newPasswordConfirm) {
        showResult('changePasswordResult', 'New passwords do not match.', false);
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Processing...';

    try {
        const data = await window.changePassword(email, oldPassword, newPassword);
        if (data.success) {
            showResult('changePasswordResult', '✅ ' + data.message, true);
            btn.disabled = false;
            btn.textContent = 'Change Password';
            setTimeout(() => {
                document.querySelector('[data-tab="loginTab"]').click();
            }, 2000);
        } else {
            showResult('changePasswordResult', '❌ ' + (data.message || 'Password change failed.'), false);
            btn.disabled = false;
            btn.textContent = 'Change Password';
        }
    } catch(err) {
        showResult('changePasswordResult', '❌ Server connection error.', false);
        btn.disabled = false;
        btn.textContent = 'Change Password';
    }
}
</script>

<!-- ============================== -->
<!-- HTML-0470: 이벤트 바인딩 및 초기화 (소분류) -->
<!-- ============================== -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // config.js, api.js, auth.js 로드 (GitHub Pages 경로)
    const scripts = [
        'member/config.js',
        'member/api.js',
        'member/auth.js'
    ];
    scripts.forEach(src => {
        const script = document.createElement('script');
        script.src = src;
        document.head.appendChild(script);
    });

    // 잠시 후 초기화 (스크립트 로드 대기)
    setTimeout(function() {
        initTabs();
        togglePasswordVisibility('loginPassword', 'toggleLoginPassword');
        togglePasswordVisibility('signupPassword', 'toggleSignupPassword');
        togglePasswordVisibility('signupPasswordConfirm', 'toggleSignupPasswordConfirm');
        togglePasswordVisibility('changeOldPassword', 'toggleChangeOldPassword');
        togglePasswordVisibility('changeNewPassword', 'toggleChangeNewPassword');
        togglePasswordVisibility('changeNewPasswordConfirm', 'toggleChangeNewPasswordConfirm');

        document.getElementById('testLoginBtn').addEventListener('click', handleLogin);
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('loginEmail').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });

        document.getElementById('testSignupBtn').addEventListener('click', handleSignup);
        document.getElementById('signupPasswordConfirm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleSignup();
        });

        document.getElementById('testChangePasswordBtn').addEventListener('click', handleChangePassword);
        document.getElementById('changeNewPasswordConfirm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleChangePassword();
        });
    }, 500);
});

console.log('✅ login.html loaded.');
</script>

</body>
</html>
